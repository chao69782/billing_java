spring:
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
  datasource:
    username: root
    password: 123456
    url: jdbc:mysql://localhost:3306/billing?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    driver-class-name: com.mysql.cj.jdbc.Driver
    druid:
      # 初始化大小
      initial-size: 5
      # 最小空闲连接数
      min-idle: 5
      # 最大活动连接数
      max-active: 20
      # 获取连接等待超时时间(毫秒)
      max-wait: 60000
      # 间隔多久才进行一次检测，检测需要关闭的空闲连接(毫秒)
      time-between-eviction-runs-millis: 60000
      # 一个连接在池中最小生存的时间(毫秒)
      min-evictable-idle-time-millis: 300000
      # 验证连接是否有效的SQL
      validation-query: SELECT 1
      # 建议配置为true，不影响性能，并且保证安全性
      test-while-idle: true
      # 申请连接时执行validationQuery检测连接是否有效
      test-on-borrow: false
      # 归还连接时执行validationQuery检测连接是否有效
      test-on-return: false
      # 开启Druid监控页面
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
        # 监控页面登录用户名
        login-username: admin
        # 监控页面登录密码
        login-password: 123456
        # 允许访问的IP地址，不配置则允许所有
        allow:
        # 拒绝访问的IP地址
        deny:

      # 开启Web监控
      web-stat-filter:
        enabled: true
        url-pattern: /*
        # 排除监控的路径
        exclusions: '*.js,*.gif,*.jpg,*.png,*.css,*.ico,/druid/*'

      # SQL监控配置
      filter:
        stat:
          enabled: true
          # 慢SQL阈值（毫秒）
          slow-sql-millis: 1000
          # 记录慢SQL
          log-slow-sql: true
        wall:
          enabled: true
  # Redis配置
  data:
    redis:
      # 数据库索引
      database: 5
      host: 127.0.0.1
      port: 6379
      password: 123456
# springdoc-openapi 配置
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
  group-configs:
    - group: '管理端模块'
      paths-to-match: '/api/admin/**'
    - group: '用户端模块'
      paths-to-match: '/api/front/**'
    - group: '公共模块'
      paths-to-match: '/api/common/**'
# knife4j 配置
knife4j:
  enable: true
  setting:
    language: zh-CN

jwt:
  # 登录 token 过期时间（按秒计算）
  expireTime: 604800
  # 登录 token 解析秘钥
  secret: Hq7MnWxTpLkRdYbVsCfGjUeZoIaPtNwA
  # 是否T下线
  kickOut: true
# shiro 配置
security:
  anon:
    - /api/admin/sys/user/login
    - /api/admin/sys/user/encryptLogin
    - /api/common/captcha/gen
    - /api/front/user/login
    # 文件
    - /file/**
    # api文档 界面
    - /v3/**
    - /doc.html
    - /swagger-ui.html
    - /webjars/**
    # Druid
    - /druid/**
#加密key
encrypt:
  publicKey: 
  privateKey: 

file:
  upload:
    path: D:\data\upload\
  web:
    url: /file/**

wechat:
  wmp:
    appId: appId
    appSecret: appSecret

langchain4j:
  community:
    dashscope:
      chat-model:
        model-name: qwen-max
        api-key: YOUR-KEY